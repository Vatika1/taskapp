spring.application.name=api-gateway
server.port=8080

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://${AUTH_SERVICE_HOST}:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=task-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://${TASK_SERVICE_HOST}:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/**

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.org.springframework.cloud.gateway=DEBUG