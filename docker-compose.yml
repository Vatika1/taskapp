version: '3.8'
services:
  
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskdb
    ports:
      - "3307:3306"

  auth-service:
    build: ./Backend/auth-service/auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      - mysql

  task-service:
    build: ./Backend/task-service/task-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      - mysql

  api-gateway:
    build: ./Backend/api-gateway/api-gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_HOST: auth-service
      TASK_SERVICE_HOST: task-service
    depends_on:
      - auth-service
      - task-service